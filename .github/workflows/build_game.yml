name: Build Game APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Find Gradle Project and Build
        run: |
          # البحث التلقائي عن المجلد الذي يحتوي على ملفات النظام
          GRADLE_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          
          if [ -z "$GRADLE_DIR" ]; then
            echo "خطأ: لم يتم العثور على ملفات نظام أندرويد في المستودع. تأكد من رفع الملفات بشكل صحيح."
            exit 1
          else
            echo "تم العثور على مشروع أندرويد في المجلد: $GRADLE_DIR"
            cd "$GRADLE_DIR"
            gradle assembleDebug
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Game-APK
          path: "**/build/outputs/apk/debug/*.apk"
